[tool.black]
line-length = 88
target-version = ['py311']
include = '\.pyi?$'
skip-magic-trailing-comma = true

[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 5
force_sort_within_sections = true
known_first_party = ["vasiniyo-chat-bot"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.format]
skip-magic-trailing-comma = true

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["vasiniyo-chat-bot"]
lines-after-imports = 2
